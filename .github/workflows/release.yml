name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        shell: bash
        run: |
          set -euo pipefail
          xcode_path="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -1)"
          test -n "$xcode_path"
          sudo xcode-select --switch "$xcode_path/Contents/Developer"
          swift --version

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          [[ "$version" =~ ^[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z]+)*$ ]]
          echo "CODINGPET_VERSION=$version" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/codingpet-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          echo "SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Materialize App Store Connect key
        shell: bash
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize DMG
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          CODINGPET_BUILD_NUMBER: ${{ github.run_number }}
        run: scripts/release-dmg.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          dmg="dist/CodingPet-${CODINGPET_VERSION}-arm64.dmg"
          checksum="$dmg.sha256"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$dmg" "$checksum" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$dmg" "$checksum" \
              --verify-tag \
              --generate-notes \
              --title "CodingPet $CODINGPET_VERSION"
          fi

      - name: Delete temporary signing material
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$SIGNING_KEYCHAIN"
          fi
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP"/AuthKey_*.p8

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26
        shell: bash
        run: |
          set -euo pipefail
          xcode_path="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -1)"
          test -n "$xcode_path"
          sudo xcode-select --switch "$xcode_path/Contents/Developer"
          swift --version

      - name: Run tests
        run: swift test

      - name: Verify application bundle
        run: bash Tests/Packaging/build-app-tests.sh
